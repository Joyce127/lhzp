<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · 联合智评</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #009660 0%, #00744B 40%, #004530 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 420px;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-header {
            text-align: center;
            padding: 2rem 2rem 1rem;
        }
        .login-header h4 {
            color: #00744B;
            font-weight: 700;
        }
        .login-header p {
            color: #6c757d;
            margin-bottom: 0;
            font-size: 0.9rem;
        }
        .btn-login {
            background-color: #00744B;
            border-color: #00744B;
            color: #fff;
        }
        .btn-login:hover {
            background-color: #009660;
            border-color: #009660;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="card login-card">
    <div class="login-header">
        <i class="bi bi-bank" style="font-size: 2.5rem; color: #00744B;"></i>
        <h4 class="mt-2">联合智评数据应用平台</h4>
        <p>数据应用平台</p>
    </div>
    <div class="card-body px-4 pb-4">

        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="mb-3">
                <label class="form-label text-muted small">用户名</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                    <input type="text" name="username" class="form-control"
                           placeholder="输入用户名" required autofocus>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label text-muted small">密码</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="bi bi-lock"></i></span>
                    <input type="password" name="password" class="form-control"
                           placeholder="输入密码" required>
                </div>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember" name="remember">
                <label class="form-check-label text-muted small" for="remember">保持登录</label>
            </div>
            <button type="submit" class="btn btn-login w-100 py-2 fw-bold">
                <i class="bi bi-box-arrow-in-right me-1"></i> 登 录
            </button>
        </form>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
